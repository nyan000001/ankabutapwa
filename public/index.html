<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
<meta name="description" content="Create a chatroom with your own code or join other people's rooms">
</head>
<title>ankabuta pwa</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<style>
:root { --color0:#ccc; --color1:#000;  --color2:#fff; --color3:#000;  --color4:#eee; --color5:#000; }
body { background:var(--color2); color:var(--color3); }
#sidebar { background:var(--color0); color:var(--color1); }
#sidebar > details { border:2px solid var(--color1); margin:1px 2px 1px 2px; }
#sidebar > details > summary { background:var(--color1); color:var(--color0); }
.edge, #status, #buttons, #msgform { background:var(--color4); color:var(--color5); }
#status { border:2px solid var(--color5); pointer-events:none; position:fixed; bottom:2px; left:2px; }
#status:empty { display:none; }

* { box-sizing:border-box; margin:0; padding:0; tab-size:2; word-break:break-word; font-size:16px; }
html, body, body > div { height:100%; }
.scrollable { overflow-y:auto; }
.grid { display:grid; }
.flex { display:flex; }
.down { flex-direction:column; }
.stretch { flex:1; min-width:0; min-height:0; }
details { user-select:none; }
summary { cursor:default; white-space:pre; font-weight:bold; }
#codeform, #code, #room, #password, #msg { flex:1; min-width:0; min-height:0; }
textarea { resize:none; }
#status, textarea, input:not([type="color"]), summary, .edge:not(:empty), #middle { padding:6px; }
#wrapper { grid-template-rows:auto 1fr auto auto auto; grid-template-columns:auto auto 1fr auto; }

#roomform, #msgform { font-family:serif; }
#sidebar { grid-row:1 / -1; overflow-x:hidden; resize:horizontal; width:150px; }
#code, #style textarea { white-space:pre; scroll-padding:3px; }
#style textarea, #msg { field-sizing:content; }
#roomlist > a { display:flex; padding:4px; text-decoration:none; margin:2px; }
#roomlist > a:hover { outline:2px solid currentColor; outline-offset:-1px; }
#roomlist > a:not(#here) > .name { text-decoration:underline; }
#sidebar > details > div { margin:3px; }
.count { width:20px; }
label:has(.toggle:not(:checked)) ~ input { opacity:.5; }
.volume { height:10px; z-index:10000; }
#colors { grid-template-rows:repeat(3, auto); grid-auto-flow:column; }
#colors > input { width:100%; }
#colors > output { text-align:center; }

#top, #bottom, #buttons, #msgform { grid-column:2 / -1; text-align:center; }
.msg { white-space:pre-wrap; }
#join { width:100%; height:100%; }
#msg { min-height:30px; max-height:200px; margin-left:2px; }
.hidden { display:none; }

#buttons { padding:3px 3px 0 3px; overflow-x:auto; }
#buttons > input { height:100%; width:40px; flex-shrink:0; padding-right:0; padding-left:0; }
#big, #super { padding-top:0; }
#big, #sub { padding-bottom:0; }
.bold { font-weight:bold; }
.italic { font-style:italic; }
.big { font-size:125%; }
.small, .super, .sub { font-size:80%; }
.super { vertical-align:super; }
.sub { vertical-align:sub; }

@media (max-height:20rem) {
	#roomsettings:not(.hidden) ~ details { display:none; }
}
</style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon192.png">
</head>
<body>
<output id="status"></output>
<div id="wrapper" class="grid">
	<div id="sidebar" class="flex down scrollable">
		<form id="roomform" class="flex">
			<input id="room">
			<input type="submit" value="go">
		</form>
		<form id="codeform" class="hidden flex down">
			<textarea id="code" spellcheck="false"></textarea>
			<input type="submit" value="run">
		</form>
		<details id="roomsettings" class="hidden">
			<summary>room settings</summary>
			<form id="colorform" class="flex down">
				<div id="colors" class="grid">
					<output>a</output>
					<input type="color" value="#CCCCCC" class="background">
					<input type="color" value="#000000" class="text">
					<output>a</output>
					<input type="color" value="#FFFFFF" class="background">
					<input type="color" value="#000000" class="text">
					<output>a</output>
					<input type="color" value="#EEEEEE" class="background">
					<input type="color" value="#000000" class="text">
				</div>
				<input type="submit" value="set colors">
			</form>
			<form id="passwordform" class="flex down">
				<input id="password" spellcheck="false">
				<input type="submit" value="set password">
			</form>
		</details>
		<details id="roomlist" open>
			<summary>rooms</summary>
		</details>
		<details id="personalsettings" open>
			<summary>settings</summary>
			<div id="roomaudio" class="flex down">
				<label><input type="checkbox" class="toggle"> new room sound</label>
				<input type="url" spellcheck="false">
				<input type="range" min="0" max="100" class="volume">
				<input type="button" value="play">
			</div>
			<div id="msgaudio" class="flex down">
				<label><input type="checkbox" class="toggle"> new message sound</label>
				<input type="url" spellcheck="false">
				<input type="range" min="0" max="100" class="volume">
				<input type="button" value="play">
			</div>
			<div id="style" class="flex down">
				<label><input type="checkbox" class="toggle"> override styles</label>
				<textarea spellcheck="false"></textarea>
			</div>
			<div id="notifications" class="hidden flex down">
				<label><input type="checkbox" class="toggle"> notifications</label>
			</div>
		</details>
	</div>
	<div id="top" class="edge flex"></div>
	<div id="left" class="edge scrollable"></div>
	<main id="middle" class="scrollable">
		<input type="button" value="loading..." id="join" disabled>
	</main>
	<div id="right" class="edge scrollable"></div>
	<div id="bottom" class="edge flex"></div>
	<div id="buttons" class="flex">
		<input type="color" id="color">
		<input type="button" value="bold" id="bold" class="bold">
		<input type="button" value="big" id="big" class="big">
		<input type="button" value="italic" id="italic" class="italic">
		<input type="button" value="sub" id="sub" class="small">
		<input type="button" value="small" id="small" class="small">
		<input type="button" value="super" id="super" class="small">
	</div>
	<form id="msgform" class="flex">
		<textarea id="msg"></textarea>
		<input type="submit" value="send" id="send" disabled>
	</form>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const get = id => document.getElementById(id);
let width = 150;
ontouchstart = e => {
	if(e.touches[0].pageX > width) return;
	let x = e.touches[0].pageX;
	ontouchmove = e => {
		if(Math.abs(e.touches[0].pageX - x) < 10) {
			x = e.touches[0].pageX;
			return;
		}
		ontouchmove = e => {
			width = e.touches[0].pageX;
			if(width < 30) {
				width = 0;
			}
			get('sidebar').style.width = width+'px';
		}
	}
	ontouchend = e => {
		ontouchmove = ontouchend = null;
		if(width < 100) {
			width = 100;
		}
	}
}
onsubmit = e => e.preventDefault();
get('roomform').onsubmit = e => {
	location.search = get('room').value;
}
const checkbox = document.querySelector('#style input');
const textarea = document.querySelector('#style textarea');
const style = localStorage.getItem('style') ?? '* {\n	--color0: black;\n	--color1: white;\n	--color2: black;\n	--color3: white;\n	--color4: black;\n	--color5: white;\n}';
checkbox.checked = style[0] == ' ';
textarea.value = style.trim();
let stylesheet;
const update = () => {
	stylesheet ??= document.createElement('style');
	stylesheet.textContent = textarea.value;
	if(checkbox.checked) {
		document.head.append(stylesheet);
	} else {
		stylesheet.remove();
	}
}
update();
get('style').oninput = () => {
	localStorage.setItem('style', (checkbox.checked? ' ': '')+textarea.value);
	update();
}
const audios = {};
for(const [id, url] of [['room', 'https://cdn.pixabay.com/audio/2022/03/10/audio_56b9fd99e8.mp3'], ['msg', 'https://www.myinstants.com/media/sounds/the-end-meow-by-nekocat-just-3-second-1.mp3']]) {
	const [checkbox, link, volume, button] = document.querySelectorAll('#'+id+'audio input');
	const audio = audios[id] = new Audio();
	[checkbox.checked, link.value, volume.value] = (localStorage.getItem(id) ?? ' |'+url+'|50').split('|');
	const update = () => {
		audio.muted = !checkbox.checked;
		audio.volume = volume.value/100;
		audio.src = link.value;
	}
	update();
	get(id+'audio').oninput = e => {
		localStorage.setItem(id, [checkbox.checked? ' ': '', link.value, volume.value].join('|'));
		update();
	}
	button.onclick = () => audios[id].play();
}
const here = decodeURI(window.location.search.slice(1)) || 'lobby';
document.title = here+' | ankabuta pwa';
let action = 'host';
let password = false;
const socket = io();
let say = msg => socket.emit('say', msg);
const msgs = [''];
let index = 0;
get('msg').oninput = e => {
	msgs[index] = get('msg').value;
	msgs.length = index+1;
}
get('buttons').onclick = get('color').oninput = e => {
	const start = get('msg').selectionStart;
	const end = get('msg').selectionEnd;
	let text = get('msg').value.slice(start, end);
	if(e.target.id == 'color') {
		text = '['+e.target.value+'#'+text.replace(/^\[#\w+#(.*)#\]$/i, '$1')+'#]';
	} else if(e.target.id == 'bold') {
		text = '[*'+text+'*]';
	} else if(e.target.id == 'big') {
		text = '[<'+text+'>]';
	} else if(e.target.id == 'italic') {
		text = '[/'+text+'/]';
	} else if(e.target.id == 'sub') {
		text = '[~'+text+'~]';
	} else if(e.target.id == 'small') {
		text = '[>'+text+'<]';
	} else if(e.target.id == 'super') {
		text = '[^'+text+'^]';
	}
	get('msg').focus();
	get('msg').setRangeText(text, start, end, 'select');
}
get('msg').onselect = e => {
	const [match, color] = get('msg').value.match(/^\[#(\w+)#.*#\]$/i) ?? [null, null];
	if(!match) return;
	if(CSS.supports('color', '#'+color)) {
		get('color').value = '#'+color;
	} else if(CSS.supports('color', color)) {
		get('color').value = color;
	}
}
get('msg').onkeydown = e => {
	if(e.key == 'Enter' && !e.shiftKey) {
		get('send').click();
		e.preventDefault();
	}
	if(e.ctrlKey) {
		if(e.key == 'ArrowUp' && index > 0) {
			get('msg').value = msgs[--index];
		} else if(e.key == 'ArrowDown' && index < msgs.length-1) {
			get('msg').value = msgs[++index];
		} else return;
		e.preventDefault();
	}
}
socket.on('connect', () => {
	get('status').value = '';
	if(action) {
		get('join').disabled = false;
		get('join').focus();
	} else {
		onbeforeunload = () => true;
		get('send').disabled = false;
	}
});
socket.on('disconnect', e => {
	console.log(e);
	get('status').value = 'disconnected';
	if(action) {
		get('join').disabled = true;
	} else {
		onbeforeunload = () => null;
		get('send').disabled = true;
	}
});
get('join').onclick = () => {
	if(action == 'join') {
		socket.emit('join', password? prompt('password'): '');
	} else {
		socket.emit('host');
	}
	onbeforeunload = () => true;
	onunload = () => socket.disconnect();
	action = '';
	get('join').remove();
	get('send').disabled = false;
	get('msgform').onsubmit = e => {
		const msg = get('msg').value;
		if(!msg) return;
		say(msg);
		msgs[index] = msg;
		msgs[++index] = '';
		msgs.length = index+1;
		get('msg').value = '';
		get('msg').focus();
	}
	socket.on('addmsgs', (msgs, side) => {
		for(const [msg, id] of msgs) {
			if(id != undefined && get(side+id)) {
				get(side+id).textContent = msg;
			} else {
				const div = document.createElement('div');
				div.classList.add('msg');
				let html = msg.replace('<', '&lt;').replace('>', '&gt;');
				for(const [a, b] of [
					['<', '&lt;'], ['>', '&gt;'],
					[/\[#(\w*)#(.*?)#\]/g, '<span style="color:$1">$2</span>'],
					[/\[\*(.*?)\*\]/g, '<span class="bold">$1</span>'],
					[/\[\/(.*?)\/\]/g, '<span class="italic">$1</span>'],
					[/\[\^(.*?)\^\]/g, '<span class="super">$1</span>'],
					[/\[~(.*?)~\]/g, '<span class="sub">$1</span>'],
					[/\[&lt;(.*?)&gt;\]/g, '<span class="big">$1</span>'],
					[/\[&gt;(.*?)&lt;\]/g, '<span class="small">$1</span>'],
				]) {
					for(let i = 0; i < 100; i++) {
						const original = html;
						html = html.replace(a, b);
						if(html == original) break;
					}
				}
				div.innerHTML = html; // what's the support for setHTML()?
				get(side).append(div);
				div.scrollIntoView();
				if(id != undefined) {
					div.id = side+id;
				}
				if(!audios.msg.muted) {
					audios.msg.play();
				}
			}
		}
	});
	socket.on('removemsgs', (ids, side) => {
		for(const id of ids) {
			get(side+id)?.remove();
		}		
	});
	socket.on('clear', sides => {
		for(const side of sides) {
			get(side).textContent = '';
		}
	});
	socket.once('kick', reason => {
		onbeforeunload = null;
		socket.removeAllListeners('connect');
		socket.removeAllListeners('disconnect');
		get('status').value = reason;
		get('send').disabled = true;
	});
}
socket.once('host', hash => {
	stylesheet?.remove();
	socket.removeAllListeners('join');
	const users = new Map([[0, hash]]);
	get('roomform').classList.add('hidden');
	get('style').classList.add('hidden');
	get('codeform').classList.remove('hidden');
	get('roomsettings').classList.remove('hidden');
	get('roomlist').open = get('personalsettings').open = false;
	if(innerHeight > 600) {
		get('roomsettings').open = true;
	}
	onkeydown = e => {
		if(e.key == 's' && e.ctrltKey) {
			e.preventDefault();
			get('run').click();
		}
	}
	get('code').value = `
		const defaultnames = ['Maka', 'Lea', 'Kawena', 'Kekoa', 'Waiola', 'Hanalei', 'Kamalani', 'Malina', 'Kanakanui', 'Lilinoe', 'Momi', 'Waipuna', 'Makoa', 'Kalei', 'Loke', 'Ululani', 'Kona', 'Kamaile', 'Maluhia', 'Leinani', 'Kaleinani', 'Mana', 'Kapuni', 'Kealoha', 'Kiele', 'Kulamanu', 'Mokihana', 'Kapono', 'Maunakea', 'Pauahi', 'Kaliko', 'Lei', 'Keola', 'Hualani', 'Kamalu', 'Makana', 'Haunani', 'Kaulana', 'Keahi', 'Kalua', 'Luana', 'Kainalu', 'Makanui', 'Kaimana', 'Punahele', 'Kanoa', 'Alana', 'Maile', 'Melia', 'Mililani', 'Keawe', 'Makai', 'Kailani', 'Momilani', 'Hina', 'Hanohano', 'Kalama', 'Nohea', 'Kainoa', 'Lani', 'Kapulani', 'Uluwehi', 'Kaipo', 'Onaona', 'Koa', 'Kanani', 'Lokelani', 'Pumehana', 'Lehua', 'Kekona', 'Kaluhi', 'Nahenahe', 'Lana', 'Kaihe', 'Puamana', 'Noelani', 'Kawai', 'Leihua', 'Kapua', 'Nani', 'Kaila', 'Puna', 'Kanamu', 'Mamo', 'Keona', 'Wailani', 'Ikaika', 'Aloha', 'Akoni', 'Kawelo', 'Kiani', 'Kamaka', 'Nanea', 'Mahina', 'Kahiau', 'Hekili', 'Hiapo', 'Lono', 'Kaina', 'Pua', 'Kini', 'Kaleo', 'Makamae', 'Kalena', 'Ipo', 'Leilani', 'Kahula', 'Pali', 'Leimamo', 'Keao', 'Manuia', 'Lanakila', 'Palikapu', 'Hiwahiwa', 'Kilohana', 'Keilani', 'Anuhea', 'Kalani'];
		function join(user, msg) {
			user.name = user.defaultname = defaultnames.shift();
			users.sendright(users.map(user => [user.id+' '+user.name, user.id]));
			users.send(user.name+' has joined');
		}
		function leave(user, msg) {
			defaultnames.push(user.defaultname);
			users.unsendright(user.id);
			users.send(user.name+' has left');
		}
		function online(user) {
			users.sendright(user.id+' '+user.name, user.id);
		}
		function offline(user) {
			users.sendright(user.id+' ('+user.name+')', user.id);
		}
		function hear(user, cmd, msg) {
			if(cmd) {
				if(['nick', 'name', 'n'].includes(cmd)) {
					users.send(user.name+' is now known as '+msg);
					user.name = msg;
					users.sendright(user.id+' '+user.name, user.id);
				} else {
					user.send('invalid command');
				}
			} else {
				users.send('[*'+user.name+'*]: '+msg);
			}
		}`.slice(1).replace(/^\t{2}/gm, '');
	get('code').focus();
	const codes = [];
	let worker;
	const run = code => {
		codes.push(code);
		const blob = new Blob([`
			class User {
				constructor(id, hash) {
					this.id = id;
					this.hash = hash;
				}
				post(action, ...args) {
					postMessage([action, [this.id], ...args]);
				}
			}
			class Users extends Array {
				static get [Symbol.species]() {
					return Users;
				}
				get(val, prop = 'id') {
					return this.find(user => user[prop] == val);
				}
				has(val, prop = 'id') {
					return this.some(user => user[prop] == val);
				}
				post(action, ...args) {
					postMessage([action, this.map(user => user.id), ...args]);
				}
			}
			for(const side of ['top', 'right', 'bottom', 'left', 'middle', '']) {
				User.prototype['send'+side] = Users.prototype['send'+side] = function (msg, msgid) {
					this.post('send', [].concat(msg).map(msg => [].concat(msg, msgid ?? []).slice(0, 2)), side || 'middle');
				}
				User.prototype['unsend'+side] = Users.prototype['unsend'+side] = function (msgids) {
					this.post('unsend', [].concat(msgids), side || 'middle');
				}
				User.prototype['clear'+side] = Users.prototype['clear'+side] = function () {
					this.post('clear', side? [side]: ['top', 'right', 'bottom', 'left', 'middle']);
				}
			}
			User.prototype.kick = Users.prototype.kick = function () {
				this.post('kick');
			}
			const users = new Users();
			${ code }
			onmessage = e => {
				const [action, id, data] = e.data;
				let user = users.get(id);
				if(action == 'join') {
					user = new User(id, data);
					users.push(user);
					this.join?.(user, data);
				} else if(!user) {
					throw Error(action+' failed: '+id+' not found');
				} else if(action == 'leave') {
					users.splice(users.findIndex(user => user.id == id), 1);
					this.leave?.(user);
				} else if(action == 'hear') {
					let cmd = '';
					let msg = data;
					if(data[0] == '/') {
						[cmd, msg = ''] = data.slice(1).split(/ (.*)/);
					}
					this.hear?.(user, cmd, msg);
				} else {
					this[action]?.(user);
				}
			}`.slice(1).replace(/^\t{3}/gm, '')
		]);
		const blobURL = (URL ?? webkitURL).createObjectURL(blob, { type: 'application/javascript; charset=utf-8' });
		worker = new Worker(blobURL);
		worker.onmessage = e => {
			socket.emit(...e.data);
		}
		worker.onerror = e => {
			get('code').style.backgroundColor = '#f00';
			codes.pop();
			if(codes.length) {
				run(codes.at(-1));
			}
		}
		socket.emit('clear', [...users.keys()], ['top', 'right', 'bottom', 'left', 'middle']);
		users.forEach((hash, id) => worker.postMessage(['join', id, hash]));
	}
	run(get('code').value);
	get('codeform').onsubmit = e => {
		get('code').style.backgroundColor = null;
		run(get('code').value);
		get('code').focus();
	}
	say = msg => {
		console.log('0: '+msg);
		worker.postMessage(['hear', 0, msg]);
	}
	const inputs = [...document.querySelectorAll('#colors > input[type="color"]')];
	get('colorform').onsubmit = e => {
		socket.emit('setcolors', inputs.map(input => input.value));
	}
	get('passwordform').onsubmit = e => {
		socket.emit('setpassword', get('password').value);
	}
	socket.on('hear', (id, msg) => {
		console.log(id+': '+msg);
		worker.postMessage(['hear', id, msg]);
	});
	socket.on('adduser', (id, hash) => {
		console.log(id+' has joined');
		users.set(id, hash);
		worker.postMessage(['join', id, hash]);
	});
	socket.on('removeuser', id => {
		console.log(id+' has left');
		worker.postMessage(['leave', id]);
		users.delete(id);
	});
	socket.on('online', id => worker.postMessage(['online', id]));
	socket.on('offline', id => worker.postMessage(['offline', id]));
	socket.on('error', error => console.warn(error));
	const update = get('colors').oninput = e => {
		const input = e.target;
		if(input.classList.contains('background')) {
			input.previousElementSibling.style.backgroundColor = input.value;
		} else {
			input.previousElementSibling.previousElementSibling.style.color = input.value;
		}
	}
	inputs.forEach(input => update({ target:input }));
	get('colors').oncontextmenu = e => {
		if(e.target.tagName == 'OUTPUT') {
			const letters = 'abcdefghijklmnopqrstuvwxyzƿðþæ';//'pbtdʈɖckɡqmɱnɲŋrɽʀβfvθðszʃʒʂçʝxɣχħhɦɬʋjlɓɗɠwɥiyɨʉɯuɪʊeøɵoəɛœɜʌɔæɐaɑɒ';
			e.target.value = letters[Math.random()*letters.length|0];
		} else if(e.target.type == 'color') {
			e.target.value = '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
		} else return;
		e.preventDefault();
		update(e);
	}
	get('colors').onmousedown = a => {
		if(a.target.type != 'color') return;
		onmouseup = b => {
			onmouseup = null;
			if(a.target.type != 'color') return;
			[a.target.value, b.target.value] = [b.target.value, a.target.value];
			update(a);
			update(b);
		}
	}
});
socket.once('join', () => {
	socket.removeAllListeners('host');
	get('msg').focus();
});
socket.once('hi', async (rooms, key) => {
	rooms = new Map(rooms);
	const setcolors = (name, colors) => {
		const a = rooms.get(name);
		a.style.backgroundColor = colors[2];
		a.style.color = colors[3];
		if(name == here) {
			for(let i = 0; i < 6; i++) {
				document.documentElement.style.setProperty('--color'+i, colors[i]);
			}
		}
	}
	socket.on('setcolors', setcolors);
	socket.on('setcount', (name, count) => {
		rooms.get(name).children[0].textContent = count;
	});
	socket.on('setlock', (name, locked) => {
		rooms.get(name).children[2].textContent = locked? '🔒': '';
		if(name == here) {
			password = locked;
		}
	});
	const addroom = (name, room) => {
		const a = document.createElement('a');
		for(let i = 0; i < 3; i++) {
			const span = document.createElement('span');
			span.textContent = [room.count, name, room.locked? '🔒': ''][i];
			span.classList.add(['count', 'name', 'lock'][i]);
			a.append(span);
		}
		a.href = '?'+name;
		if(name == here) {
			a.id = 'here';
			if(action) {
				action = 'join';
				get('join').value = 'join '+here;
			}
		}
		get('roomlist').append(a);
		rooms.set(name, a);
		setcolors(name, room.colors);
	}
	rooms.forEach((room, name) => addroom(name, room));
	if(action == 'host') {
		get('join').value = 'host '+here;
	}
	socket.on('addroom', (name, room) => {
		addroom(name, room);
		if(!audios.room.muted) {
			audios.room.play();
		}
	});
	socket.on('removeroom', (name, count) => {
		if(name == here && action) {
			action = 'host';
			get('join').value = 'host '+here;
		}
		rooms[name]?.remove();
		delete rooms[name];
	});
	if(!('serviceWorker' in navigator)) return;
	const registration = await navigator.serviceWorker.register('/sw.js');
	if(!('PushManager' in window) || Notification.permission == 'denied') return;
	get('notifications').classList.remove('hidden');
	let subscription = await registration.pushManager.getSubscription();
	const checkbox = document.querySelector('#notifications input');
	checkbox.checked = Boolean(subscription);
	const channel = new BroadcastChannel('subscription');
	channel.onmessage = e => checkbox.checked = e.data.status == 'subscribed';
	const f = url => {
		fetch(url, {
			method:'POST',
			headers:{ 'Content-Type': 'application/json' },
			body:JSON.stringify(subscription),
		});
	}
	checkbox.oninput = async () => {
		checkbox.disabled = true;
		if(checkbox.checked && !subscription) {
			const permission = await Notification.requestPermission();
			if(permission != 'granted') {
				checkbox.checked = false;
				return;
			}
			subscription = await registration.pushManager.subscribe({
				userVisibleOnly:true,
				applicationServerKey:Uint8Array.fromBase64(key, { alphabet:'base64url' })
			});
			await f('/subscribe');
			channel.postMessage({ status:'subscribed' });
		} else if(!checkbox.checked && subscription) {
			await f('/unsubscribe');
			await subscription.unsubscribe();
			subscription = null;
			channel.postMessage({ status:'unsubscribed' });
		}
		checkbox.disabled = false;
	}
});
</script>
